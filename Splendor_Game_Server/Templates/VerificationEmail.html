<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Email Verification</title>
</head>
<body style="margin:0; padding:20px; background:#f3f4f6; font-family:Arial, sans-serif;">
    <div style="max-width:600px; margin:0 auto; background:white; border-radius:10px; padding:40px; box-shadow:0 4px 10px rgba(0,0,0,0.08);">
        <h1 style="color:#7084fe; text-align:center;">Verify Your Email</h1>
        <p style="font-size: 16px; color: #ea5032; text-align: center; ">
            Hi <strong>{{email}}</strong>,
        </p>
        <div style="text-align:center; margin:30px 0;">
            <span style="display:inline-block; background:#7084fe; color:white; font-size:22px; font-weight:bold; letter-spacing:3px; padding:14px 28px; border-radius:8px;">
                {{code}}
            </span>
        </div>
        <p style="font-size:14px; color:#6b7280; text-align:center;">
            This code will expire in <strong>10 minutes</strong>.
        </p>
        <div style="margin-top:40px; text-align:center; font-size:13px; color:#9ca3af;">
            <hr style="border:none; border-top:1px solid #e5e7eb; margin-bottom:15px;" />
            <p>
                Made with <span style="color:#ea5032;">❤</span> by Board Game Team
            </p>
        </div>
    </div>
</body>
</html>
